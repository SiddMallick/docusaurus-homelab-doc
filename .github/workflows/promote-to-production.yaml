name: Promote to production

env:
    IMAGE_NAME: msiddhartha1600/docusaurus-homelab-docs

on:
    workflow_dispatch:
        inputs:
            image_sha:
                description: "Commit SHA to promote"
                required: true
            version:
                description: "Production Release version (e.g. v1.2.0)"
                required: true

jobs:
    promote:
        runs-on: ubuntu-24.04

        steps:
            - name: Docker Login
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
        
            - name: Pull Image
              run: |
                docker pull $IMAGE_NAME:${{ github.event.inputs.image_sha }}
            
            - name: Tag Images and Push
              run: |
                docker tag $IMAGE_NAME:${{ github.event.inputs.image_sha }} $IMAGE_NAME:${{ github.event.inputs.version }}
                docker push $IMAGE_NAME:${{ github.event.inputs.version }}
                echo "✅ SUCCESS: Image $IMAGE_NAME with tag ${{ github.event.inputs.version }} was pushed as a release image"

                